# L6+h16 baseline with val sigma=1 (matching test metric)
# Fix: smooth_sigma_val 6→1 so early stopping selects checkpoint that
# maximises the same metric the test set uses. scheduler_patience bumped
# 5→8 because sigma=1 val_r is noisier than sigma=6.

seed: 123

data:
  task: bci4
  subject: 1
  data_dir: data/fingerflex
  bci4_data_dir: data/bci4
  sr: 1000
  n_targets: 5

preprocessing_lomtev:
  bandpass_lo: 40.0
  bandpass_hi: 300.0
  notch_freqs: [50]
  n_wavelets: 40
  downsample_fs: 100
  time_delay_sec: 0.2
  n_jobs: 1

windowing_lomtev:
  sample_len: 256
  stride: 1

split:
  val_frac: 0.15

model:
  name: transformer
  d_model: 1024
  n_layers: 6
  n_heads: 16
  dim_feedforward: 4096
  spatial_kernel_size: 1
  dropout: 0.1

training:
  batch_size: 64
  epochs: 50
  optimizer: adam
  lr: 8.42e-5
  weight_decay: 1.0e-6
  scheduler: reduce_on_plateau
  scheduler_patience: 8
  scheduler_factor: 0.5
  early_stopping_patience: 20
  grad_clip_max_norm: 1.0
  loss: mse_cosine

evaluation:
  metric: pearson_r
  smooth_sigma_val: 1
  smooth_sigma_test: 1

logging:
  use_wandb: false
  tags: [bci4, transformer, d1024, ff4096, L6, h16, valr_scheduler]
