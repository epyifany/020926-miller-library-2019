# TCN on BCI Competition IV — baseline (v1)
# Same preprocessing as bci4_lomtev.yaml, only model section differs.

seed: 123

data:
  task: bci4
  subject: 1
  data_dir: data/fingerflex
  bci4_data_dir: data/bci4
  sr: 1000
  n_targets: 5

preprocessing_lomtev:
  bandpass_lo: 40.0
  bandpass_hi: 300.0
  notch_freqs: [50]       # 50 Hz for European data
  n_wavelets: 40
  downsample_fs: 100
  time_delay_sec: 0.2
  n_jobs: 1

windowing_lomtev:
  sample_len: 256
  stride: 1

split:
  val_frac: 0.15

model:
  name: tcn
  hidden_channels: 64
  kernel_size: 5
  n_blocks: 6
  dilation_base: 2
  dropout: 0.1
  strides: [1]

training:
  batch_size: 128
  epochs: 40
  optimizer: adam
  lr: 8.42e-5
  weight_decay: 1.0e-6
  scheduler: reduce_on_plateau
  scheduler_patience: 5
  scheduler_factor: 0.5
  early_stopping_patience: 15
  grad_clip_max_norm: 1.0
  loss: mse_cosine

evaluation:
  metric: pearson_r
  smooth_sigma_val: 6
  smooth_sigma_test: 1

logging:
  use_wandb: false
  wandb_project: plact-motor-decoding
  tags: [bci4, tcn, grid]
