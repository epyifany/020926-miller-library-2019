# NestedUNet with our standard training setup (not paper's fixed-LR setup)
#
# Architecture test: does UNet++ dense skip connections add value over plain U-Net?
# Baseline: U-Net test_r (sigma=1, 85% train) = S1=0.575, S2=0.520, S3=0.692 mean=0.596
#
# Differences from plain U-Net:
#   - NestedUNet dense skip connections (UNet++ style)
#   - k=3 encoder, k=1 decoder (vs U-Net k=3 everywhere)
#   - mse_cosine loss (same as our U-Net)
#
# Training: our best setup from Transformer tuning (ReduceLROnPlateau, val carve)

seed: 123

data:
  task: bci4
  subject: 1
  data_dir: data/fingerflex
  bci4_data_dir: data/bci4
  sr: 1000
  n_targets: 5

preprocessing_lomtev:
  bandpass_lo: 40.0
  bandpass_hi: 300.0
  notch_freqs: [50]
  n_wavelets: 40
  downsample_fs: 100
  time_delay_sec: 0.2
  n_jobs: 1

windowing_lomtev:
  sample_len: 256
  stride: 1

split:
  val_frac: 0.15          # standard carve for LR scheduling

model:
  name: nested_unet
  n_channels_out: 5
  base_ch: 32
  kernel_size: 3

training:
  batch_size: 128
  epochs: 40
  optimizer: adam
  lr: 8.42e-5
  weight_decay: 0.0
  scheduler: reduce_on_plateau
  scheduler_patience: 8
  early_stopping_patience: 20
  grad_clip_max_norm: 1.0
  loss: mse_cosine

evaluation:
  metric: pearson_r
  smooth_sigma_val: 1
  smooth_sigma_test: 1

logging:
  use_wandb: false
  tags: [bci4, nested_unet, architecture_test]
