# TCN v2 — tuned for reduced overfitting
# Changes from v1: dropout 0.1→0.25, hidden 64→48, weight_decay 1e-6→1e-4

seed: 42

data:
  task: fingerflex
  patient: bp            # One of: bp, cc, ht, jc, jp, mv, wc, wm, zt
  data_dir: data/fingerflex
  sr: 1000               # Sampling rate (Hz)
  n_targets: 5           # 5 fingers

preprocessing:
  pipeline_mode: lomtev
  apply_car: true
  notch_freqs: [60, 120, 180]
  bandpass_lo: 40.0
  bandpass_hi: 300.0
  normalize: true

preprocessing_lomtev:
  bandpass_lo: 40.0
  bandpass_hi: 300.0
  notch_freqs: [60, 120, 180]
  n_wavelets: 40
  downsample_fs: 100
  time_delay_sec: 0.2
  n_jobs: 1

windowing:
  window_size: 1000
  hop_size: 100

windowing_lomtev:
  sample_len: 256
  stride: 1

split:
  train_frac: 0.70
  val_frac: 0.15
  test_frac: 0.15

model:
  name: tcn
  hidden_channels: 48      # was 64 — fewer params to reduce overfitting
  kernel_size: 5
  n_blocks: 6
  dilation_base: 2
  dropout: 0.25            # was 0.1 — stronger regularization
  strides: [1]

training:
  batch_size: 128
  epochs: 20
  optimizer: adam
  lr: 8.42e-5
  weight_decay: 1.0e-4     # was 1e-6 — stronger L2 regularization
  scheduler: reduce_on_plateau
  scheduler_patience: 5
  scheduler_factor: 0.5
  early_stopping_patience: 15
  grad_clip_max_norm: 1.0
  loss: mse_cosine

evaluation:
  metric: pearson_r
  smooth_sigma_val: 6
  smooth_sigma_test: 1

logging:
  use_wandb: true
  wandb_project: plact-motor-decoding
  tags: [miller, tcn-v2]
